<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Portale Nucleare</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"Poppins",sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:radial-gradient(circle at top,#0a0f24,#000);
        overflow:hidden;
        color:white;
    }

    /* TITOLO ANIMATO */
    h1{
        font-size:3.8rem;
        text-transform:uppercase;
        letter-spacing:0.18em;
        background:linear-gradient(120deg,#00f5ff,#00ff85,#ffd700);
        -webkit-background-clip:text;
        color:transparent;
        animation:glow 3s infinite ease-in-out;
        user-select:none;
    }

    @keyframes glow{
        0%{ text-shadow:0 0 10px rgba(0,245,255,0.4); }
        50%{ text-shadow:0 0 28px rgba(0,255,133,0.9); }
        100%{ text-shadow:0 0 10px rgba(0,245,255,0.4); }
    }

    .subtitle{
        margin-top:0.6rem;
        font-size:0.9rem;
        letter-spacing:0.18em;
        text-transform:uppercase;
        color:#9feeff;
        opacity:0.8;
    }

    /* BARRA DI RICERCA */
    .search-box{
        margin-top:2.3rem;
        width:80%;
        max-width:480px;
        display:flex;
        gap:0.5rem;
    }

    .search-box input{
        flex:1;
        padding:0.8rem 1rem;
        border-radius:999px;
        border:1px solid rgba(0,245,255,0.4);
        background:rgba(0,10,20,0.85);
        color:#dffaff;
        font-size:1rem;
        outline:none;
        box-shadow:0 0 12px rgba(0,245,255,0.25);
    }

    .search-box button{
        padding:0.8rem 1.3rem;
        border-radius:999px;
        border:none;
        background:linear-gradient(120deg,#00f5ff,#00ff85);
        color:#001018;
        font-weight:600;
        cursor:pointer;
        transition:0.2s;
    }

    .search-box button:hover{
        transform:scale(1.05);
        box-shadow:0 0 20px rgba(0,245,255,0.7);
    }

    .hint{
        margin-top:0.8rem;
        font-size:0.8rem;
        color:#9bb4ff;
        opacity:0.8;
    }

    /* PARTICELLE */
    .particle{
        position:absolute;
        width:8px;
        height:8px;
        border-radius:50%;
        background:rgba(0,245,255,0.7);
        opacity:0.7;
        animation:floatUp linear infinite;
    }

    @keyframes floatUp{
        0%{ transform:translateY(100vh); opacity:0; }
        10%{ opacity:0.8; }
        90%{ opacity:0.8; }
        100%{ transform:translateY(-10vh); opacity:0; }
    }
</style>
</head>
<body>

<h1>NUCLEARE</h1>
<div class="subtitle">titolo = password</div>

<div class="search-box">
    <input id="searchInput" type="text" placeholder="Scrivi: energia, ottenimento, termica..." />
    <button id="searchBtn">Vai</button>
</div>

<div class="hint">
    Suggerimenti: <strong>energia</strong> · <strong>ottenimento</strong> · <strong>termica</strong>
</div>

<div id="particles"></div>

<script>
    /* PARTICELLE */
    const container = document.getElementById("particles");
    for(let i=0;i<40;i++){
        const p=document.createElement("div");
        p.className="particle";
        p.style.left=Math.random()*100+"vw";
        p.style.animationDuration=8+Math.random()*12+"s";
        p.style.animationDelay=-Math.random()*20+"s";
        container.appendChild(p);
    }

    /* LOGICA DELLA BARRA DI RICERCA */
    const input = document.getElementById("searchInput");
    const btn = document.getElementById("searchBtn");

    function go(){
        const v = input.value.trim().toLowerCase();
        if(!v) return;

        if(v.includes("energia") || v.includes("cos") || v.includes("spiega")){
            window.location.href = "energia.html";
        }
        else if(v.includes("otten") || v.includes("produr") || v.includes("come")){
            window.location.href = "ottenimento.html";
        }
        else if(v.includes("termica") || v.includes("centrale") || v.includes("termoelettrica")){
            window.location.href = "termica.html";
        }
        else{
            alert("Parole chiave: energia · ottenimento · termica");
        }
    }

    btn.addEventListener("click", go);
    input.addEventListener("keydown", e => { if(e.key==="Enter") go(); });
</script>

</body>
</html>
