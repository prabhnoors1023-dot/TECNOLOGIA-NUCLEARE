<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Grazie</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
  }

  body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#000,#111);
    overflow:hidden;
  }

  h1{
    font-size:3rem;
    background:linear-gradient(120deg,#00f5ff,#00ff85,#ffd700);
    -webkit-background-clip:text;
    color:transparent;
    text-shadow:0 0 25px rgba(0,245,255,0.6);
    letter-spacing:0.15em;
    text-transform:uppercase;
    animation:glow 3s infinite ease-in-out;
  }

  @keyframes glow{
    0%{ text-shadow:0 0 10px rgba(0,245,255,0.4); }
    50%{ text-shadow:0 0 30px rgba(0,255,133,0.9); }
    100%{ text-shadow:0 0 10px rgba(0,245,255,0.4); }
  }

  /* PARTICELLE */
  .particle{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(0,245,255,0.7);
    opacity:0.7;
    animation:floatUp linear infinite;
  }

  @keyframes floatUp{
    0%{ transform:translateY(100vh); opacity:0; }
    10%{ opacity:0.8; }
    90%{ opacity:0.8; }
    100%{ transform:translateY(-10vh); opacity:0; }
  }
</style>
</head>
<body>

<h1>Grazie per l'attenzione</h1>

<div id="particles"></div>

<script>
  const container = document.getElementById("particles");
  for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=8+Math.random()*12+"s";
    p.style.animationDelay=-Math.random()*20+"s";
    container.appendChild(p);
  }
</script>

</body>
</html>
